version: "3.9"

# Local dev overrides — hot reload for all services
services:
  frontend:
    build:
      target: dev
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      - LOG_LEVEL=DEBUG

  mcp-server:
    command: python -m bisense_mcp
    volumes:
      - ./mcp-server/src:/app/src
    environment:
      - LOG_LEVEL=DEBUG
      - WATCHFILES_FORCE_POLLING=true
